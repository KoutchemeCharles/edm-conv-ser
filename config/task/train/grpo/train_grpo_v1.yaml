name: "DAPO"
force_thinking: true
need_fast_inference: true  
args:
  run_name: "dapo"
  # Important GRPO parameters; default to all original settings
  loss_type: "dapo"
  scale_rewards: false
  epsilon: 0.2
  epsilon_high: 0.28
  beta: 0.0
  mask_truncated_completions: true
  
  # GRPO generation parameters
  num_generations: 4
  temperature: 1.0
  top_p: 1.0
  num_iterations: 1
  generation_kwargs:
    num_generations: 4
    temperature: 1.0
    top_p: 1.0
    num_iterations: 1
    
  # Related general training parameters - batch 
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 1
  generation_batch_size: null 
  gradient_checkpointing: true 
  max_grad_norm: 0.3
  
  ##
  num_train_epochs: 1
  warmup_ratio: 0.10
  learning_rate: 0.00001
  lr_scheduler_type: "constant_with_warmup" 
  optim: adamw_8bit
  adam_beta1: 0.9
  adam_beta2: 0.99
  # weight_decay: 0.001
  
  max_prompt_length: 3072
  max_completion_length: 1024

  eval_strategy: "no"
  save_strategy: "no"

  # Data loader
  dataloader_pin_memory: False
  dataloader_num_workers: 1
  torch_empty_cache_steps: 2

  logging_steps: 5
  log_completions: true  
  # num_completions_to_print: 3

  # Bonus
  use_vllm: False
  vllm_mode: colocate

lora:
  r: 8
  lora_alpha: 16
  bias: "none"

k: 1 # Number of samples per prompt 
max_dataset_size: 5000